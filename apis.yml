aid: hawkeye-360
name: HawkEye 360
description: >-
  HawkEye 360 is a Herndon, Virginia-based radio frequency (RF) data analytics
  and geospatial intelligence company that operates the first commercial
  satellite constellation purpose-built to identify, process, and geolocate
  a broad range of RF signals from space. Founded in 2015 by Chris DeMay,
  Charles Clancy, and Bob McGwier, the company flies clusters of three small
  satellites in formation that use time- and frequency-difference-of-arrival
  triangulation to pinpoint emitters across VHF through Ku-band. As of 2025,
  HawkEye 360 has placed 36 Hawk satellites on orbit across 12 operational
  clusters. Its core products include RFGeo (the underlying RF signal mapping
  and geolocation data product), RFIQ (its RF intelligence data product
  recently selected by NASA Commercial LEO programs), and Mission Space, a
  web-based RF geospatial intelligence analysis platform. The company also
  offers a Regional Awareness Subscription (RAS) service providing persistent
  monitoring of high-interest regions such as the Mediterranean, South China
  Sea, and the Korean Peninsula. In December 2023 HawkEye 360 acquired Maxar
  Intelligence's RF Solutions business (formerly Aurora Insight), expanding
  its spectrum-mapping capabilities. Customers are concentrated in defense,
  intelligence, national security, and maritime domain awareness — including
  the US Government, allied partners, and foreign military sales (a 2025 FMS
  to India was approved by the Defense Security Cooperation Agency). HawkEye
  360 has filed an S-1 with the SEC for a proposed IPO. There is no public,
  self-service developer API, SDK, or open-source release; data access is
  delivered through gated commercial and government contracts via the Mission
  Space platform and a customer-facing API for ordering and integration of
  RF analytics into customer systems.
